<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Puff</title>
  <meta name="robots" content="noindex" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      color: #fff;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(34,197,94,0.25), transparent 35%),
        radial-gradient(circle at top right, rgba(59,130,246,0.22), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a 45%, #111827);
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }

    .header {
      text-align: center;
      padding: 42px 20px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(2,6,23,0.58);
      backdrop-filter: blur(14px);
    }

    .logo {
      font-size: 38px;
      letter-spacing: 4px;
      font-weight: 800;
    }

    .logo span {
      color: #22c55e;
    }

    .tagline {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 15px;
    }

    .age-note {
      max-width: 1100px;
      margin: 18px auto 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(250,204,21,0.1);
      border: 1px solid rgba(250,204,21,0.25);
      color: #fde68a;
      font-size: 14px;
      line-height: 1.6;
    }

    .topbar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-box input {
      width: 280px;
      max-width: 100%;
      padding: 13px 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(15,23,42,0.85);
      color: white;
      outline: none;
    }

    .category-filter {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .category-btn {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(30,41,59,0.85);
      color: #e5e7eb;
      padding: 11px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s;
    }

    .category-btn.active,
    .category-btn:hover {
      background: #22c55e;
      color: #03120a;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 20px 50px;
    }

    .section-title {
      font-size: 24px;
      margin: 16px 0 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .card {
      background: rgba(15,23,42,0.78);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      box-shadow: 0 18px 35px rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 45px rgba(0,0,0,0.42);
    }

    .card img {
      width: 100%;
      height: 245px;
      object-fit: cover;
      background: #020617;
    }

    .card-content {
      padding: 17px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .tag {
      display: inline-block;
      width: fit-content;
      background: rgba(34,197,94,0.15);
      color: #86efac;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .product-name {
      font-size: 20px;
      line-height: 1.3;
      margin-bottom: 10px;
      min-height: 52px;
    }

    .price {
      color: #facc15;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .info {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .status {
      display: inline-block;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .ready {
      background: rgba(34,197,94,0.15);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.3);
    }

    .soldout {
      background: rgba(248,113,113,0.14);
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.32);
    }

    .telegram-btn {
      margin-top: auto;
      text-align: center;
      text-decoration: none;
      background: #22c55e;
      color: #03120a;
      font-weight: bold;
      padding: 13px 14px;
      border-radius: 14px;
      transition: 0.2s;
    }

    .telegram-btn:hover {
      background: #16a34a;
      color: white;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      background: rgba(15,23,42,0.75);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .footer {
      text-align: center;
      padding: 28px 20px 45px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .topbar {
        flex-direction: column;
      }

      .search-box input {
        width: 100%;
      }

      .logo {
        font-size: 30px;
      }

      .product-name {
        min-height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">LUCKY <span>PUFF</span></div>
    <p class="tagline">Simple. Smooth. Positive Vibes Only.</p>

    <div class="age-note">
      Khusus 18+ / dewasa. Produk ini hanya untuk pengguna yang sudah memenuhi usia legal. Please purchase responsibly.
    </div>
  </div>

  <div class="topbar">
    <div class="category-filter" id="categoryFilter"></div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari device, liquid, rasa..." />
    </div>
  </div>

  <div class="container">
    <h2 class="section-title">Daftar Produk</h2>
    <div class="products" id="productList"></div>
  </div>

  <div class="footer">
    © 2026 Lucky Puff — Order via Telegram
  </div>

  <script>
    const telegramUsername = "usernamekamu";

    const products = [
      {
        category: "Device",
        name: "Pod Device Black",
        price: "Rp180.000",
        detail: "Warna: Black | Type: Rechargeable",
        stock: 8,
        image: "https://images.unsplash.com/photo-1600855594291-0c68f7f6f622?auto=format&fit=crop&w=900&q=80"
      },
      {
        category: "Device",
        name: "Mini Pod Silver",
        price: "Rp150.000",
        detail: "Warna: Silver | Compact design",
        stock: 4,
        image: "https://images.unsplash.com/photo-1585238342024-78d387f4a707?auto=format&fit=crop&w=900&q=80"
      },
      {
        category: "Liquid",
        name: "Mango Ice Liquid",
        price: "Rp95.000",
        detail: "Rasa: Mango Ice | Nicotine: 3mg",
        stock: 12,
        image: "https://images.unsplash.com/photo-1580913428023-02c695666d61?auto=format&fit=crop&w=900&q=80"
      },
      {
        category: "Liquid",
        name: "Grape Mint Liquid",
        price: "Rp95.000",
        detail: "Rasa: Grape Mint | Nicotine: 3mg",
        stock: 0,
        image: "https://images.unsplash.com/photo-1615397349754-cfa2066a298e?auto=format&fit=crop&w=900&q=80"
      },
      {
        category: "Cartridge",
        name: "Replacement Cartridge",
        price: "Rp45.000",
        detail: "Isi: 1 pcs | Compatible pod device",
        stock: 10,
        image: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?auto=format&fit=crop&w=900&q=80"
      }
    ];

    let activeCategory = "Semua";

    const productList = document.getElementById("productList");
    const categoryFilter = document.getElementById("categoryFilter");
    const searchInput = document.getElementById("searchInput");

    function telegramLink(product) {
      const text =
        `Halo kak, saya mau order:%0A%0A` +
        `Produk: ${product.name}%0A` +
        `Kategori: ${product.category}%0A` +
        `Harga: ${product.price}%0A` +
        `Detail: ${product.detail}`;

      return `https://t.me/${telegramUsername}?text=${text}`;
    }

    function renderCategories() {
      const categories = ["Semua", ...new Set(products.map(p => p.category))];

      categoryFilter.innerHTML = categories.map(category => `
        <button class="category-btn ${category === activeCategory ? "active" : ""}" onclick="setCategory('${category}')">
          ${category}
        </button>
      `).join("");
    }

    function renderProducts() {
      const keyword = searchInput.value.toLowerCase();

      const filtered = products.filter(product => {
        const matchCategory = activeCategory === "Semua" || product.category === activeCategory;

        const searchableText = [
          product.category,
          product.name,
          product.price,
          product.detail
        ].join(" ").toLowerCase();

        return matchCategory && searchableText.includes(keyword);
      });

      if (filtered.length === 0) {
        productList.innerHTML = `<div class="empty-state">Produk tidak ditemukan.</div>`;
        return;
      }

      productList.innerHTML = filtered.map(product => `
        <div class="card">
          <img src="${product.image}" alt="${product.name}">
          <div class="card-content">
            <span class="tag">${product.category}</span>
            <h3 class="product-name">${product.name}</h3>
            <div class="price">${product.price}</div>
            <div class="info">${product.detail}</div>

            <span class="status ${product.stock === 0 ? "soldout" : "ready"}">
              ${product.stock === 0 ? "Sold Out" : "Ready"}
            </span>

            <a class="telegram-btn" href="${telegramLink(product)}" target="_blank">
              ${product.stock === 0 ? "Tanya via Telegram" : "Order via Telegram"}
            </a>
          </div>
        </div>
      `).join("");
    }

    function setCategory(category) {
      activeCategory = category;
      renderCategories();
      renderProducts();
    }

    searchInput.addEventListener("input", renderProducts);

    renderCategories();
    renderProducts();
  </script>

</body>
</html>
