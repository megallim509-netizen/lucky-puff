<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Puff</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: Arial, sans-serif;
  color:white;
  background:
    radial-gradient(circle at 20% 40%, rgba(34,197,94,.25), transparent 30%),
    radial-gradient(circle at 80% 60%, rgba(168,85,247,.25), transparent 35%),
    linear-gradient(135deg, #020617, #050816 40%, #020617);
  overflow-x:hidden;
}

/* SMOKE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
  opacity:0.06;
  filter: blur(5px);
  animation: smokeMove 40s linear infinite;
  z-index:-2;
}

@keyframes smokeMove {
  0% { transform: scale(1) translateY(0); }
  50% { transform: scale(1.1) translateY(-20px); }
  100% { transform: scale(1) translateY(0); }
}

/* GLOW BACKGROUND */
body::after{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  right:-200px;
  top:100px;
  background: radial-gradient(circle, rgba(124,255,58,0.25), transparent 60%);
  filter: blur(40px);
  z-index:-1;
}

/* NAV */
.nav{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:26px;
  font-weight:900;
}
.logo span{color:#7cff3a}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-size:14px;
  font-weight:bold;
}

.nav .order{
  background:#7cff3a;
  color:#061106;
  padding:10px 16px;
  border-radius:999px;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px 40px;
}

.hero h1{
  font-size:60px;
  text-shadow:0 0 25px rgba(124,255,58,.4);
}

.hero span{color:#7cff3a}

.hero p{
  margin-top:20px;
  color:#cbd5e1;
}

/* FILTER */
.topbar{
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

.filters{
  display:flex;
  gap:10px;
}

.filter-btn{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(124,255,58,.3);
  background:#0f172a;
  color:white;
  cursor:pointer;
}

.filter-btn.active,
.filter-btn:hover{
  background:#7cff3a;
  color:black;
}

.search input{
  padding:12px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:white;
}

/* PRODUCTS */
.products{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* GLASS CARD */
.card{
  background: rgba(15,23,42,0.45);
  backdrop-filter: blur(18px);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 0 40px rgba(124,255,58,.3);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.price{
  color:#7cff3a;
  font-weight:bold;
}

/* BUTTON */
.telegram-btn{
  display:block;
  margin-top:10px;
  text-align:center;
  background:#7cff3a;
  color:black;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  box-shadow:0 0 20px rgba(124,255,58,.4);
}

.telegram-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px rgba(124,255,58,.8);
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">LUCKY <span>PUFF</span></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Produk</a>
    <a href="#" class="order">Order</a>
  </div>
</div>

<div class="hero">
  <h1>FEEL THE <span>CLOUD</span></h1>
  <p>100% original vape store dengan vibe modern & smooth</p>
</div>

<div class="topbar">
  <div class="filters" id="categoryFilter"></div>
  <div class="search">
    <input type="text" id="searchInput" placeholder="Cari vape...">
  </div>
</div>

<div class="products" id="productList"></div>

<script>
const telegramUsername = "usernamekamu";

const products = [
  {category:"Device",name:"Vape X Pro",price:"Rp150.000",stock:5,image:"https://images.unsplash.com/photo-1600855594291-0c68f7f6f622?auto=format&fit=crop&w=900&q=80"},
  {category:"Device",name:"Vape Mini",price:"Rp120.000",stock:3,image:"https://images.unsplash.com/photo-1585238342024-78d387f4a707?auto=format&fit=crop&w=900&q=80"},
  {category:"Liquid",name:"Mango Ice",price:"Rp90.000",stock:10,image:"https://images.unsplash.com/photo-1580913428023-02c695666d61?auto=format&fit=crop&w=900&q=80"},
  {category:"Liquid",name:"Grape Mint",price:"Rp90.000",stock:0,image:"https://images.unsplash.com/photo-1615397349754-cfa2066a298e?auto=format&fit=crop&w=900&q=80"}
];

let activeCategory="Semua";

function renderCategories(){
  const categories=["Semua",...new Set(products.map(p=>p.category))];
  document.getElementById("categoryFilter").innerHTML =
    categories.map(c=>`<button class="filter-btn ${c===activeCategory?"active":""}" onclick="setCategory('${c}')">${c}</button>`).join("");
}

function renderProducts(){
  const keyword=document.getElementById("searchInput").value.toLowerCase();

  const filtered=products.filter(p=>{
    const matchCategory=activeCategory==="Semua"||p.category===activeCategory;
    const matchSearch=p.name.toLowerCase().includes(keyword);
    return matchCategory&&matchSearch;
  });

  document.getElementById("productList").innerHTML =
    filtered.map(p=>`
      <div class="card">
        <img src="${p.image}">
        <div class="card-content">
          <h3>${p.name}</h3>
          <div class="price">${p.price}</div>
          <a class="telegram-btn" href="https://t.me/${telegramUsername}" target="_blank">Order</a>
        </div>
      </div>
    `).join("");
}

function setCategory(c){
  activeCategory=c;
  renderCategories();
  renderProducts();
}

document.getElementById("searchInput").addEventListener("input",renderProducts);

renderCategories();
renderProducts();
</script>

</body>
</html>
